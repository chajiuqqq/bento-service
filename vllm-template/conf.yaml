name: minimax-m2-5
model_id: MiniMaxAI/MiniMax-M2.5
gpu_type: nvidia-h100-80gb
tp: 4
local_model_path: /models/MiniMax-M2.5
cli_args:
  - --served-model-name
  - MiniMaxAI/MiniMax-M2.5
  - --trust-remote-code
  - --enable-auto-tool-choice
  - --tool-call-parser
  - minimax_m2
  - --reasoning-parser
  - minimax_m2
  - --gpu-memory-utilization
  - "0.8"
  - --max-model-len
  - 192k
  - --max-num-batched-tokens
  - 16k
  - --max-num-seqs
  - "32"
  - --disable-custom-all-reduce
  - --kv-cache-dtype
  - fp8
  - --enable-prompt-tokens-details
log_body: false
log_level: INFO
trace_header: X-Oneapi-Request-Id
metadata:
  description: MiniMax M2.5
  provider: MiniMax
  gpu_recommendation: an Nvidia GPU with at least 80GB VRAM
hf_generation_config:
  temperature: 0.6
  top_p: 0.9
  repetition_penalty: 1.0
